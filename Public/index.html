// MAIN DUB — limit check pehle!
async function startDub(){
  if(!me){ go('login'); return; }

  // ─── FREE LIMIT CHECK ────────────────────────────────
  if(me.plan!=='pro' && (me.dubs||0)>=FREE_LIMIT){
    showPaywall(); // Paywall dikhao
    return;
  }

  const url=document.getElementById('vid-url').value.trim();
  if(curTab==='url'&&!url){ toast('Video URL daalo',''); return; }
  if(curTab==='file'&&!selFile){ toast('Pehle video choose karo',''); return; }

  const lang=document.getElementById('lang-sel').value;
  const flag=document.getElementById('lang-sel').options[document.getElementById('lang-sel').selectedIndex].getAttribute('data-flag')||'🎙';

  document.getElementById('dub-form').style.display='none';
  document.getElementById('dub-prog').style.display='';
  document.getElementById('dub-err').style.display='none';
  document.getElementById('dub-res').style.display='none';

  startProg();

  try {
    const fd=new FormData();
    fd.append('language',lang);
    if(curTab==='file'&&selFile) fd.append('video',selFile);
    else fd.append('videoUrl',url);

    const resp=await fetch('/api/dub',{method:'POST',body:fd});
    stopProg(resp.ok);

    if(!resp.ok){ const err=await resp.json(); throw new Error(err.error||'Server error'); }

    const data=await resp.json();
    await sleep(300);

    // ─── INCREMENT DUB COUNT ─────────────────────────
    if(me.plan!=='pro'){
      me.dubs=(me.dubs||0)+1;
      updateLbar(); updateNav();
      const left=FREE_LIMIT-me.dubs;
      if(left===1) toast('⚡ Sirf 1 free video bachi! Phir Premium chahiye.','warn');
      else if(left===0) toast('🚨 Ye aapki aakhri free video thi! Premium lo unlimited ke liye.','warn');
    }

    // ─── SHOW RESULT ─────────────────────────────────
    document.getElementById('dub-prog').style.display='none';
    document.getElementById('dub-res').style.display='';
    const vid=document.getElementById('res-vid');
    vid.src=data.videoUrl; vid.load(); vid.play().catch(()=>{});
    document.getElementById('dl-btn').href=data.videoUrl;
    document.getElementById('r-lang').textContent=flag+' '+data.language;
    document.getElementById('r-size').textContent=data.sizeMB+' MB';
    document.getElementById('t-orig').textContent=data.originalText||'—';
    document.getElementById('t-tag').textContent=data.language.toUpperCase()+' TRANSLATION';
    document.getElementById('t-trans').textContent=data.translatedText||'—';
    curVid={id:'v'+Date.now(),user:me.email,title:selFile?selFile.name.replace(/\.\w+$/,''):'Dubbed Video',lang:data.language,flag,date:new Date().toISOString().split('T')[0],size:data.sizeMB+' MB',videoUrl:data.videoUrl};
    document.getElementById('save-btn').style.display='';

  } catch(err){
    stopProg(false);
    document.getElementById('dub-prog').style.display='none';
    document.getElementById('dub-err').style.display='';
    document.getElementById('err-msg').textContent=err.message;
  }
}

function saveVid(){ if(!curVid) return; savedVids.unshift(curVid); document.getElementById('save-btn').style.display='none'; toast('✅ Dashboard mein save ho gaya!','ok'); }

function resetDub(){
  clearInterval(progIv);
  ['dub-form'].forEach(id=>document.getElementById(id).style.display='');
  ['dub-prog','dub-err','dub-res'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('vid-url').value=''; selFile=null; curVid=null;
  document.getElementById('d-ico').textContent='📤'; document.getElementById('d-txt').textContent='Tap karke choose karo'; document.getElementById('d-hint').textContent='MP4, MOV, AVI';
  document.getElementById('p-fill').style.width='0%';
  for(let i=0;i<STEPS.length;i++){ const d=document.getElementById('pd'+i); if(d) d.className='pdot'; }
  updateLbar();
}

// DASHBOARD
function renderDash(){
  const my=savedVids.filter(v=>v.user===me?.email);
  document.getElementById('dash-count').textContent=my.length+' video'+(my.length!==1?'s':'');
  const list=document.getElementById('vid-list');
  if(my.length===0){ list.innerHTML='<div class="empty"><div style="font-size:44px;opacity:.2;margin-bottom:10px">🎬</div><div style="color:rgba(255,255,255,.35);font-size:13px;margin-bottom:14px">Koi video save nahi ki abhi tak.</div><button class="btn btn-p btn-sm" onclick="go(\'home\')">Pehla Video Dub Karo</button></div>'; return; }
  list.innerHTML=my.map((v,i)=>`
    <div class="vid-card">
      <div class="vid-thumb" onclick="playD(${i})">
        <video id="dv${i}" src="${v.videoUrl}"></video>
        <div class="play-d" id="dpb${i}">▶</div>
      </div>
      <div class="vid-body">
        <div class="vid-name">${v.title}</div>
        <div style="display:flex;gap:8px;font-size:10px;color:rgba(255,255,255,.4);flex-wrap:wrap;margin-bottom:8px">
          <span>${v.flag} ${v.lang}</span><span>💾 ${v.size}</span><span>📅 ${v.date}</span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-g btn-sm" onclick="playD(${i})">▶ Play</button>
          <a class="btn btn-g btn-sm" href="${v.videoUrl}" download="dubbed.mp4">⬇ Download</a>
          <button class="btn btn-g btn-sm" onclick="delVid('${v.id}')">🗑</button>
        </div>
      </div>
    </div>`).join('');
}
function playD(i){ const vid=document.getElementById('dv'+i),btn=document.getElementById('dpb'+i); if(vid.style.display!=='block'){ vid.style.display='block'; btn.style.display='none'; vid.play().catch(()=>{}); } else { vid.style.display='none'; btn.style.display='flex'; vid.pause(); } }
function delVid(id){ savedVids=savedVids.filter(v=>v.id!==id); renderDash(); toast('Video delete ho gaya',''); }

function toast(msg,type){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(type==='ok'?' ok':type==='warn'?' warn':''); setTimeout(()=>t.className='toast',3000); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
